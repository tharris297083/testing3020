<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sliding Box</title>
<style>
  .box {
    width: 100px;
    height: 100px;
    background: royalblue;
    position: relative;
    animation: slide 3s linear infinite;
  }

  @keyframes slide {
    0%   { left: 0; }
    50%  { left: 80%; }
    100% { left: 0; }
  }
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
